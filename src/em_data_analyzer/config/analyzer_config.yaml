# PointCloud Analyzer Configuration
# ROS2 parameter file format requires ros__parameters at the root level

pointcloud_analyzer:
  ros__parameters:
    # Topic names
    topics:
      pointcloud: "/PointcloudFromKMALL"
      gps: "gps_info"
      leg_status: "/leg_status"
      stats_output: "/swath_line_stats"
      shadow_output: "/shadow_analysis"
      viz_pointcloud: "/viz/accumulated_pointcloud"
      viz_gps_path: "/viz/gps_path"
      viz_shadows: "/viz/shadows"
    
    # Queue sizes for ROS2 subscriptions/publishers
    queue_sizes:
      pointcloud: 10
      gps: 100
      leg_status: 10
      stats_output: 10
      shadow_output: 10
      viz: 10
    
    # GPS synchronization
    gps:
      buffer_size: 100
    
    # Shadow/hole detection parameters
    shadow_detection:
      grid_cell_size: 5.0         # Larger cells for less granular analysis
      density_threshold: 0.3      # 30% of mean density (more reasonable threshold)
      edge_exclusion_factor: 0.05 # Exclude only 5% of mean swath width from edges
      along_track_exclusion: 10.0 # Smaller exclusion distance along track (meters)

    # Visualization parameters
    visualization:
      max_accumulated_points: 100000     # Maximum points to keep in memory
      point_decimation_distance: 1.0     # Minimum distance between points (meters)
